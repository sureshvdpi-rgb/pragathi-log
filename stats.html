<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medical Stats</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #0f0f0f; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px; padding-bottom: 120px;
        }

        h1 { 
            font-size: 2.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; 
            background: linear-gradient(to bottom, #fff, #888); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            margin-top: 10px;
        }
        .divider { width: 40px; height: 4px; background-color: #007aff; margin: 10px auto 25px; border-radius: 10px; }

        .stats-grid { width: 100%; max-width: 420px; display: grid; gap: 15px; }

        .stat-card {
            background: linear-gradient(145deg, #2a2a2a, #1e1e1e);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 28px; padding: 22px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card-title { font-size: 0.75rem; color: #aaa; text-transform: uppercase; font-weight: 800; letter-spacing: 1.5px; margin-bottom: 12px; }

        /* 3D PIE CHART STYLES */
        .pie-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 20px auto;
            perspective: 1000px;
        }
        .pie-chart {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#333 0% 100%);
            position: relative;
            /* 3D Lift Effect */
            transform: rotateX(25deg);
            box-shadow: 
                0 15px 0 #000, 
                0 20px 30px rgba(0,0,0,0.5);
            transition: 0.5s ease;
        }
        .pie-labels-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            transform: rotateX(25deg); /* Match the chart tilt */
        }
        .pie-label {
            position: absolute;
            font-size: 0.55rem;
            font-weight: 900;
            color: #000;
            transform: translate(-50%, -50%);
            text-align: center;
            line-height: 1.1;
            width: 80px;
            text-shadow: 0 1px 0 rgba(255,255,255,0.2);
        }

        /* STAR RATING */
        .star-container { display: flex; align-items: center; gap: 15px; margin-top: 5px; }
        .stars { display: flex; gap: 4px; font-size: 1.8rem; color: #333; }
        .star-active { color: #00ffaa; text-shadow: 0 0 10px rgba(0, 255, 170, 0.3); }
        .tir-info { flex: 1; }
        .tir-info p { font-size: 0.9rem; font-weight: 800; margin-bottom: 2px; }
        .tir-info span { font-size: 0.65rem; color: #666; font-weight: 700; text-transform: uppercase; }

        /* BAR CHART STYLES */
        .bar-chart { display: flex; align-items: flex-end; justify-content: space-between; gap: 8px; height: 140px; margin-top: 25px; padding-bottom: 25px; width: 100%; }
        .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; position: relative; }
        .bar-pair { display: flex; align-items: flex-end; gap: 2px; height: 100%; width: 100%; justify-content: center; }
        .bar { flex: 1; background: #007aff; border-radius: 3px 3px 1px 1px; position: relative; min-height: 2px; transition: height 0.5s ease; width: 100%; }
        .bar-value { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 0.5rem; font-weight: 900; color: #fff; }
        .group-label { position: absolute; bottom: -20px; font-size: 0.5rem; color: #666; font-weight: 800; text-transform: uppercase; white-space: nowrap; }

        .big-val { font-size: 2.4rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
        .sub-label { font-size: 0.65rem; color: #777; font-weight: 700; text-transform: uppercase; }

        .back-nav { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 1000;}
        .back-btn { background-color: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); color: #fff; text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; padding: 16px 40px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 100px; }
    </style>
</head>
<body>

    <h1>STATS</h1>
    <div class="divider"></div>

    <div class="stats-grid">
        <div class="stat-card">
            <div style="display: flex; justify-content: space-between;">
                <div>
                    <div class="card-title">Est. HbA1c</div>
                    <div class="big-val" id="hba1c-val">--</div>
                    <div class="sub-label">90 Day projection</div>
                </div>
                <div style="text-align: right;">
                    <div class="card-title">Avg Glucose</div>
                    <div class="big-val" id="avg-val" style="color: #ff9500;">--</div>
                    <div class="sub-label">mg/dL</div>
                </div>
            </div>
        </div>

        <div class="stat-card">
            <div class="card-title">Time In Range Score</div>
            <div class="star-container">
                <div class="stars" id="star-rating">
                    <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
                </div>
                <div class="tir-info">
                    <p id="tir-status">Analyzing...</p>
                    <span id="tir-percent">0% TIR</span>
                </div>
            </div>
        </div>

        <div class="stat-card">
            <div class="card-title">Glucose Distribution</div>
            <div class="pie-wrapper">
                <div class="pie-chart" id="glucose-pie"></div>
                <div class="pie-labels-container" id="pie-labels"></div>
            </div>
        </div>

        <div class="stat-card">
            <div class="card-title">7-Day Avg by Meal</div>
            <div class="bar-chart" id="category-bars"></div>
        </div>

        <div class="stat-card">
            <div class="card-title">Last 7 Days (Avg)</div>
            <div class="bar-chart" id="weekly-bars"></div>
        </div>
    </div>

    <div class="back-nav"><a href="./index.html" class="back-btn">← Home</a></div>

    <script>
        function getLogs() { return JSON.parse(localStorage.getItem('user_logs') || '[]'); }

        function calculateStats() {
            const logs = getLogs().filter(l => l.glucose !== '--');
            if (logs.length === 0) return;
            const values = logs.map(l => parseFloat(l.glucose));
            
            const avg = values.reduce((a, b) => a + b, 0) / values.length;
            document.getElementById('avg-val').innerText = Math.round(avg);
            document.getElementById('hba1c-val').innerText = ((avg + 46.7) / 28.7).toFixed(1) + "%";

            const total = values.length;
            const counts = {
                low: values.filter(v => v < 70).length,
                tir: values.filter(v => v >= 70 && v <= 180).length,
                high: values.filter(v => v > 180 && v <= 240).length,
                vhigh: values.filter(v => v > 240).length
            };

            updatePieChart(counts, total);
            updateStarRating(Math.round((counts.tir / total) * 100));
            renderWeeklyChart(logs);
            renderCategoryChart(logs);
        }

        function updatePieChart(counts, total) {
            const data = [
                { label: 'LOW', range: '<70', val: counts.low, color: '#ffcc00' },
                { label: 'IN RANGE', range: '70-180', val: counts.tir, color: '#00ffaa' },
                { label: 'ELEVATED', range: '181-240', val: counts.high, color: '#ff9500' },
                { label: 'HIGH', range: '>240', val: counts.vhigh, color: '#ff4d4d' }
            ];

            let currentPercent = 0;
            let gradientStr = "conic-gradient(";
            const labelContainer = document.getElementById('pie-labels');
            labelContainer.innerHTML = '';

            data.forEach((item, index) => {
                const percent = (item.val / total) * 100;
                if (percent > 0) {
                    const start = currentPercent;
                    const end = currentPercent + percent;
                    gradientStr += `${item.color} ${start}% ${end}%${index < data.length - 1 ? ',' : ''}`;
                    
                    // Logic to position labels in the middle of segments
                    if (percent > 8) { 
                        const midAngle = ((start + (percent / 2)) / 100) * 2 * Math.PI - (Math.PI / 2);
                        const radius = 75; 
                        const x = 130 + radius * Math.cos(midAngle);
                        const y = 130 + radius * Math.sin(midAngle);
                        
                        const label = document.createElement('div');
                        label.className = 'pie-label';
                        label.style.left = x + 'px';
                        label.style.top = y + 'px';
                        label.innerHTML = `${item.label}<br>(${item.range})<br>${Math.round(percent)}%`;
                        labelContainer.appendChild(label);
                    }
                    currentPercent = end;
                }
            });

            if (currentPercent === 0) gradientStr += "#333 0% 100%";
            gradientStr += ")";
            document.getElementById('glucose-pie').style.background = gradientStr;
        }

        function updateStarRating(tir) {
            const stars = document.getElementById('star-rating').children;
            document.getElementById('tir-percent').innerText = tir + "% TIME IN RANGE";
            let starCount = Math.ceil(tir / 20);
            for (let i = 0; i < 5; i++) {
                stars[i].className = i < starCount ? 'star-active' : '';
            }
            document.getElementById('tir-status').innerText = tir >= 70 ? "Good Control" : "Needs Attention";
        }

        function createSingleBar(value) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = value > 0 ? Math.min((value / 300) * 100, 100) + '%' : '2px';
            bar.style.backgroundColor = value > 240 ? '#ff4d4d' : value > 180 ? '#ff9500' : (value < 70 && value > 0 ? '#ffcc00' : (value > 0 ? '#00ffaa' : '#333'));
            if (value > 0) {
                const span = document.createElement('span');
                span.className = 'bar-value';
                span.innerText = Math.round(value);
                bar.appendChild(span);
            }
            return bar;
        }

        function renderWeeklyChart(logs) {
            const container = document.getElementById('weekly-bars');
            container.innerHTML = '';
            for (let i = 6; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const dayStr = d.toISOString().split('T')[0];
                const dayLogs = logs.filter(l => l.timestamp.startsWith(dayStr));
                const avg = dayLogs.length > 0 ? dayLogs.reduce((s, c) => s + parseFloat(c.glucose), 0) / dayLogs.length : 0;
                
                const groupDiv = document.createElement('div');
                groupDiv.className = 'bar-group';
                const pairDiv = document.createElement('div');
                pairDiv.className = 'bar-pair';
                pairDiv.appendChild(createSingleBar(avg));
                groupDiv.appendChild(pairDiv);
                
                const label = document.createElement('span');
                label.className = 'group-label';
                label.innerText = dayStr.split('-')[2];
                groupDiv.appendChild(label);
                container.appendChild(groupDiv);
            }
        }

        function renderCategoryChart(logs) {
            const container = document.getElementById('category-bars');
            container.innerHTML = '';
            const sevenDaysAgoStr = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0];

            const groups = [
                { label: 'Morning', keys: ['Early Morning'] },
                { label: 'Breakfast', keys: ['Pre Breakfast', 'Post Breakfast'] },
                { label: 'Lunch', keys: ['Pre Lunch', 'Post Lunch'] },
                { label: 'Snack', keys: ['Pre Snack', 'Post Snack'] },
                { label: 'Dinner', keys: ['Pre Dinner', 'Post Dinner'] },
                { label: 'Bed', keys: ['Bed Time'] }
            ];

            groups.forEach(g => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'bar-group';
                const pairDiv = document.createElement('div');
                pairDiv.className = 'bar-pair';

                g.keys.forEach(key => {
                    const catLogs = logs.filter(l => l.category === key && l.timestamp >= sevenDaysAgoStr);
                    const avg = catLogs.length > 0 ? catLogs.reduce((s, c) => s + parseFloat(c.glucose), 0) / catLogs.length : 0;
                    pairDiv.appendChild(createSingleBar(avg));
                });

                groupDiv.appendChild(pairDiv);
                const label = document.createElement('span');
                label.className = 'group-label';
                label.innerText = g.label;
                groupDiv.appendChild(label);
                container.appendChild(groupDiv);
            });
        }

        calculateStats();
    </script>
</body>
</html>
