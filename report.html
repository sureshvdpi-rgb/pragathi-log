<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Glucose Report</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 10px; color: #000; background: #fff; }
        
        .no-print { 
            background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .filter-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .filter-row label { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; color: #444; }
        .filter-row input, .filter-row select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; font-size: 0.8rem; }
        
        .action-row { display: flex; justify-content: space-between; margin-top: 5px; align-items: center; }
        .btn { padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; border: none; text-decoration: none; font-size: 0.8rem; }
        .btn-print { background: #007aff; color: white; }
        .btn-back { background: #666; color: white; }
        .btn-filter { background: #333; color: white; }
        
        header { border-bottom: 2px solid #000; margin-bottom: 15px; padding-bottom: 10px; }
        h1 { font-size: 1.2rem; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 4px; text-align: center; font-size: 0.55rem; word-wrap: break-word; }
        th { background: #f0f0f0; font-weight: bold; text-transform: uppercase; }
        
        .date-col { width: 55px; font-weight: bold; background: #f9f9f9; }
        .basal-col { background: #f0f8ff; font-weight: bold; }
        .high { color: red; font-weight: bold; }
        .low { color: blue; font-weight: bold; }

        @media print {
            .no-print { display: none; }
            body { padding: 0; }
            @page { size: landscape; margin: 0.5cm; }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <div class="filter-row">
            <label>View Mode:</label>
            <select id="view-mode" onchange="renderReport()">
                <option value="full">Full Clinical View</option>
                <option value="meals">Breakfast, Lunch & Dinner Only</option>
            </select>

            <label>Range:</label>
            <select id="quick-range" onchange="applyQuickRange(this.value)">
                <option value="custom">Custom</option>
                <option value="7" selected>Last 7 Days</option>
                <option value="14">Last 14 Days</option>
                <option value="30">Last 30 Days</option>
                <option value="90">Last 90 Days</option>
            </select>
            
            <label>From:</label>
            <input type="date" id="filter-from">
            <label>To:</label>
            <input type="date" id="filter-to">
            <button class="btn btn-filter" onclick="renderReport()">Apply</button>
        </div>
        <div class="action-row">
            <a href="index.html" class="btn btn-back">← Back</a>
            <button class="btn btn-print" onclick="window.print()">Print Report</button>
        </div>
    </div>

    <header>
        <h1 id="user-display">Daily Glucose & Insulin Log</h1>
        <p id="date-generated"></p>
    </header>

    <table id="medical-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        function applyQuickRange(days) {
            if (days === 'custom') return;
            const to = new Date();
            const from = new Date();
            from.setDate(to.getDate() - parseInt(days));
            document.getElementById('filter-to').value = to.toISOString().split('T')[0];
            document.getElementById('filter-from').value = from.toISOString().split('T')[0];
            renderReport();
        }

        function setDefaults() {
            const now = new Date();
            const lastWeek = new Date();
            lastWeek.setDate(now.getDate() - 7);
            document.getElementById('filter-from').value = lastWeek.toISOString().split('T')[0];
            document.getElementById('filter-to').value = now.toISOString().split('T')[0];
        }

        function renderReport() {
            const name = localStorage.getItem('profile_name') || "Pragathi Suresh";
            const viewMode = document.getElementById('view-mode').value;
            const fromDate = document.getElementById('filter-from').value;
            const toDate = document.getElementById('filter-to').value;

            document.getElementById('user-display').innerText = name + " - Clinical Report";
            document.getElementById('date-generated').innerText = "Range: " + fromDate + " to " + toDate;

            const logs = JSON.parse(localStorage.getItem('user_logs') || '[]');
            const grouped = {};

            logs.forEach(log => {
                const date = log.timestamp.split('T')[0];
                if (date >= fromDate && date <= toDate) {
                    if (!grouped[date]) grouped[date] = {};
                    grouped[date][log.category] = { g: log.glucose, i: log.insulin };
                }
            });

            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; 

            if (viewMode === 'full') {
                thead.innerHTML = `
                    <tr>
                        <th rowspan="2" class="date-col">Date</th>
                        <th rowspan="2">Early Morning</th>
                        <th colspan="3">Breakfast</th>
                        <th colspan="3">Lunch</th>
                        <th colspan="3">Snack</th>
                        <th colspan="3">Dinner</th>
                        <th rowspan="2">Bed Time</th>
                        <th rowspan="2" class="basal-col">Daily Basal</th>
                    </tr>
                    <tr>
                        <th>Pre</th><th>Post</th><th>Unit</th>
                        <th>Pre</th><th>Post</th><th>Unit</th>
                        <th>Pre</th><th>Post</th><th>Unit</th>
                        <th>Pre</th><th>Post</th><th>Unit</th>
                    </tr>`;
            } else {
                thead.innerHTML = `
                    <tr>
                        <th rowspan="2" class="date-col">Date</th>
                        <th colspan="3">Breakfast</th>
                        <th colspan="3">Lunch</th>
                        <th colspan="3">Dinner</th>
                        <th rowspan="2" class="basal-col">Daily Basal</th>
                    </tr>
                    <tr>
                        <th>Pre</th><th>Post</th><th>Unit</th>
                        <th>Pre</th><th>Post</th><th>Unit</th>
                        <th>Pre</th><th>Post</th><th>Unit</th>
                    </tr>`;
            }

            const sortedDates = Object.keys(grouped).sort((a, b) => new Date(a) - new Date(b));
            if (sortedDates.length === 0) {
                tbody.innerHTML = `<tr><td colspan="20" style="padding:20px;">No logs found.</td></tr>`;
                return;
            }

            sortedDates.forEach(date => {
                const d = grouped[date];
                const row = document.createElement('tr');
                const f = (cat, type = 'g') => {
                    const entry = d[cat];
                    if (!entry) return '--';
                    if (type === 'i') return entry.i || '0';
                    const val = entry.g;
                    if (val === '--') return '--';
                    if (parseInt(val) > 180) return `<span class="high">${val}</span>`;
                    if (parseInt(val) < 70) return `<span class="low">${val}</span>`;
                    return val;
                };

                if (viewMode === 'full') {
                    row.innerHTML = `
                        <td class="date-col">${new Date(date).toLocaleDateString([], {month:'short', day:'numeric'})}</td>
                        <td>${f('Early Morning')}</td>
                        <td>${f('Pre Breakfast')}</td><td>${f('Post Breakfast')}</td><td>${f('Pre Breakfast', 'i')}</td>
                        <td>${f('Pre Lunch')}</td><td>${f('Post Lunch')}</td><td>${f('Pre Lunch', 'i')}</td>
                        <td>${f('Pre Snack')}</td><td>${f('Post Snack')}</td><td>${f('Pre Snack', 'i')}</td>
                        <td>${f('Pre Dinner')}</td><td>${f('Post Dinner')}</td><td>${f('Pre Dinner', 'i')}</td>
                        <td>${f('Bed Time')}</td>
                        <td class="basal-col">${f('Daily Basal', 'i')}</td>`;
                } else {
                    row.innerHTML = `
                        <td class="date-col">${new Date(date).toLocaleDateString([], {month:'short', day:'numeric'})}</td>
                        <td>${f('Pre Breakfast')}</td><td>${f('Post Breakfast')}</td><td>${f('Pre Breakfast', 'i')}</td>
                        <td>${f('Pre Lunch')}</td><td>${f('Post Lunch')}</td><td>${f('Pre Lunch', 'i')}</td>
                        <td>${f('Pre Dinner')}</td><td>${f('Post Dinner')}</td><td>${f('Pre Dinner', 'i')}</td>
                        <td class="basal-col">${f('Daily Basal', 'i')}</td>`;
                }
                tbody.appendChild(row);
            });
        }

        setDefaults();
        renderReport();
    </script>
</body>
</html>
